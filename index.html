<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA Studio | Minimalist Apparel Architecture</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Google Fonts for Luxury Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    h1, h2, .brand-font { font-family: 'Cormorant Garamond', serif; }
  </style>
</head>
<body class="bg-[#fcfbf9] text-[#1c1b1a] antialiased">

  <!-- Promo Banner -->
  <div class="bg-[#1c1b1a] text-[#fcfbf9] text-center text-xs tracking-widest py-2.5 uppercase font-medium">
    Complimentary Worldwide Shipping on Orders Over $150
  </div>

  <!-- Navigation -->
  <nav class="border-b border-gray-100 sticky top-0 bg-[#fcfbf9]/80 backdrop-blur-md z-50">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="hidden md:flex space-x-8 text-xs tracking-widest uppercase font-medium">
        <a href="#" class="hover:text-neutral-500 transition-colors">Collection</a>
        <a href="#" class="hover:text-neutral-500 transition-colors">Journal</a>
      </div>
      
      <a href="index.html" class="brand-font text-3xl font-semibold tracking-wide text-center">A U R A</a>
      
      <div class="flex items-center space-x-6 text-xs tracking-widest uppercase font-medium">
        <a href="#" class="hover:text-neutral-500 transition-colors">Search</a>
        <a href="#" class="relative hover:text-neutral-500 transition-colors">
          Cart (<span id="cart-count">0</span>)
        </a>
      </div>
    </div>
  </nav>

  <!-- Luxury Hero Section -->
  <header class="relative h-[70vh] bg-neutral-200 flex items-center justify-center overflow-hidden">
    <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=1600&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover brightness-95" alt="Hero Image">
    <div class="absolute inset-0 bg-black/10"></div>
    <div class="relative text-center text-white px-4">
      <h1 class="text-5xl md:text-7xl font-light tracking-wide mb-6">Effortless Wardrobe Systems</h1>
      <p class="text-sm tracking-widest uppercase font-light max-w-md mx-auto mb-8 text-neutral-200">Bespoke cuts. Generous proportions. Crafted for longevity.</p>
      <a href="#catalog" class="inline-block bg-white text-neutral-900 text-xs tracking-widest uppercase px-8 py-4 hover:bg-neutral-900 hover:text-white transition-all duration-300 font-medium">Explore Collection</a>
    </div>
  </header>

  <!-- Product Catalog Section -->
  <main id="catalog" class="max-w-7xl mx-auto px-6 py-24">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-12">
      <div>
        <span class="text-xs tracking-widest text-neutral-400 uppercase block mb-2">// CURRENT EDITION</span>
        <h2 class="text-4xl font-light tracking-tight">The Core Collection</h2>
      </div>
    </div>

    <!-- Injecting Products Grid Via JS Fetch -->
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
      <!-- Loading Skeleton/Placeholder -->
      <p class="text-sm text-neutral-400 font-mono">Initializing store matrix...</p>
    </div>
  </main>

  <!-- Core JavaScript Pipeline -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('products.json')
        .then(res => res.json())
        .then(products => {
          const grid = document.getElementById('product-grid');
          grid.innerHTML = ''; // Clear fallback string
          
          products.forEach(product => {
            grid.innerHTML += `
              <div class="group cursor-pointer relative" onclick="window.location.href='product.html?id=${product.id}'">
                <div class="aspect-[3/4] overflow-hidden bg-neutral-100 mb-4 relative">
                  ${product.tag ? `<span class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm text-[10px] tracking-widest uppercase font-semibold px-2.5 py-1 z-10 text-neutral-900">${product.tag}</span>` : ''}
                  <img src="${product.primaryImage}" class="w-full h-full object-cover object-center group-hover:scale-105 transition-transform duration-700 ease-out" alt="${product.name}">
                </div>
                <div class="flex justify-between items-start">
                  <div>
                    <p class="text-xs text-neutral-400 tracking-wider uppercase mb-1">${product.category}</p>
                    <h3 class="text-sm font-medium text-neutral-800 tracking-wide">${product.name}</h3>
                  </div>
                  <p class="text-sm font-medium text-neutral-900">$${product.price.toFixed(2)}</p>
                </div>
              </div>
            `;
          });
        })
        .catch(err => console.error("Data ingestion failure:", err));
    });
  </script>
</body>
</html>
